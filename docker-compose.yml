version: '3.8'

services:
  wordpress:
    image: wordpress:latest
    container_name: wp-fse-dev
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
    volumes:
      # Mount your themes directory to WordPress wp-content/themes
      - ./themes:/var/www/html/wp-content/themes
      # Mount plugins directory
      - ./plugins:/var/www/html/wp-content/plugins
      # Mount mu-plugins directory
      - ./mu-plugins:/var/www/html/wp-content/mu-plugins
      # Persist WordPress files (core, uploads, etc.)
      - wordpress_data:/var/www/html
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: wp-fse-db
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  # Optional: phpMyAdmin for database management
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: wp-fse-phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: wordpress
      PMA_PASSWORD: wordpress
    depends_on:
      - db
    restart: unless-stopped

volumes:
  wordpress_data:
  db_data:
